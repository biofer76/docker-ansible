---
- name: Test Ansible container
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Print hello
      ansible.builtin.debug:
        msg: "Ansible is working! Version: {{ ansible_version.full }}"

    - name: Show OS of the container
      ansible.builtin.debug:
        msg: "OS: {{ ansible_facts['os_family'] }} - {{ ansible_facts['distribution'] }}"
